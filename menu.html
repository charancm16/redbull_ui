<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Class Glass Navbar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0d15;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            /* Background Gradient Orbs */
            background-image:
                radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(0, 255, 255, 0.05) 0%, transparent 40%);
            background-color: #0b0d15;
        }

        /* Floating animated orbs for premium feel */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            will-change: transform;
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #b8860b;
            top: -100px;
            left: -100px;
            animation: floatOrb 12s ease-in-out infinite alternate;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: #4b0082;
            bottom: -150px;
            right: -150px;
            animation: floatOrb 15s ease-in-out infinite alternate-reverse;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(80px, 60px) scale(1.2);
            }
        }

        /* Main Glass Navbar */
        .navbar {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 80px;
            padding: 12px 28px;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform: translateY(-30px);
            opacity: 0;
        }

        @keyframes slideDown {
            0% {
                opacity: 0;
                transform: translateY(-40px) scale(0.96);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Top reflection shine */
        .navbar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            width: 80%;
            height: 30%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.15) 0%, transparent 100%);
            border-radius: 100%;
            pointer-events: none;
            filter: blur(2px);
        }

        .nav-list {
            display: flex;
            list-style: none;
            gap: 8px;
            align-items: center;
            position: relative;
        }

        .nav-item {
            position: relative;
            padding: 0 4px;
        }

        .nav-link {
            display: block;
            padding: 12px 24px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            border-radius: 60px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
            z-index: 5;
            white-space: nowrap;
        }

        .nav-link:hover {
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            transform: translateY(-2px) scale(1.05);
            background: rgba(255, 255, 255, 0.03);
        }

        /* The sliding active indicator (glass pill) */
        .active-indicator {
            position: absolute;
            bottom: 6px;
            left: 4px;
            height: calc(100% - 12px);
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 60px;
            backdrop-filter: blur(8px);
            transition: all 0.45s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 0;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.05);
            pointer-events: none;
            will-change: transform, width;
        }

        /* Staggered fade-in for items */
        .nav-item {
            opacity: 0;
            animation: fadeStagger 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .nav-item:nth-child(1) {
            animation-delay: 0.1s;
        }

        .nav-item:nth-child(2) {
            animation-delay: 0.2s;
        }

        .nav-item:nth-child(3) {
            animation-delay: 0.3s;
        }

        .nav-item:nth-child(4) {
            animation-delay: 0.4s;
        }

        .nav-item:nth-child(5) {
            animation-delay: 0.5s;
        }

        @keyframes fadeStagger {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 700px) {
            .navbar {
                padding: 12px 16px;
                border-radius: 40px;
                margin: 0 20px;
            }

            .nav-list {
                gap: 2px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .nav-link {
                padding: 10px 14px;
                font-size: 0.8rem;
            }

            .active-indicator {
                display: none;
                /* Simpler on mobile */
            }

            .nav-link:hover {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <!-- Background Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Glass Navigation -->
    <nav class="navbar" role="navigation">
        <ul class="nav-list" id="navList">
            <!-- The sliding pill indicator -->
            <div class="active-indicator" id="activeIndicator"></div>

            <li class="nav-item" data-key="features">
                <span class="nav-link" data-target="features">Features</span>
            </li>
            <li class="nav-item" data-key="products">
                <span class="nav-link" data-target="products">Products</span>
            </li>
            <li class="nav-item" data-key="home">
                <span class="nav-link" data-target="home">Home</span>
            </li>
            <li class="nav-item" data-key="brand">
                <span class="nav-link" data-target="brand">Brand</span>
            </li>
            <li class="nav-item" data-key="contact">
                <span class="nav-link" data-target="contact">Contact</span>
            </li>
        </ul>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const indicator = document.getElementById('activeIndicator');
            const navItems = document.querySelectorAll('.nav-item');
            const navLinks = document.querySelectorAll('.nav-link');
            let currentTarget = 'home'; // Default active

            // Function to move the indicator
            function moveIndicator(targetKey) {
                const targetItem = document.querySelector(`.nav-item[data-key="${targetKey}"]`);
                if (!targetItem) return;

                const link = targetItem.querySelector('.nav-link');
                const navList = document.getElementById('navList');
                const navRect = navList.getBoundingClientRect();
                const linkRect = link.getBoundingClientRect();

                // Calculate relative position inside the nav list
                const left = linkRect.left - navRect.left + navList.scrollLeft;
                const width = linkRect.width;

                indicator.style.left = `${left}px`;
                indicator.style.width = `${width}px`;
                indicator.style.opacity = '1';

                // Update active styles (optional visual feedback)
                navLinks.forEach(l => l.style.color = 'rgba(255,255,255,0.6)');
                link.style.color = '#ffffff';
            }

            // Set initial position for 'Home'
            // Small delay to ensure layout is fully painted
            requestAnimationFrame(() => {
                moveIndicator('home');
            });

            // Add click listeners to each link
            navLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    const target = link.dataset.target;
                    if (target) {
                        currentTarget = target;
                        moveIndicator(target);
                    }
                });
            });

            // Handle window resize to recalculate indicator position
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    moveIndicator(currentTarget);
                }, 100);
            });

            // Optional: Hover effect to move indicator temporarily (premium touch)
            navLinks.forEach(link => {
                link.addEventListener('mouseenter', () => {
                    const target = link.dataset.target;
                    if (target && target !== currentTarget) {
                        moveIndicator(target);
                    }
                });
                link.addEventListener('mouseleave', () => {
                    // Return to the active one
                    moveIndicator(currentTarget);
                });
            });
        });
    </script>
</body>

</html>
